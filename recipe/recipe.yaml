schema_version: 1

context:
  name: proxystore
  version: "1.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/proxystore-${{ version }}.tar.gz
  sha256: 1d6b6edd5fdc31ac6fa096b09025b8adb1c8e25e16d2a4380b588501cdee5bac

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - proxystore-endpoint = proxystore.endpoint.cli:cli
      - proxystore-globus-auth = proxystore.globus.cli:cli
      - proxystore-relay = proxystore.p2p.relay.run:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - click !=8.1.4
    - cloudpickle >=3
    - cryptography >=39.0.1
    - globus-sdk >=4,<5
    - pydantic >=2,<3
    # for all python, not just py<3.11, to stay noarch: python
    - tomli
    - tomli-w
    - typing_extensions >=4.3.0

tests:
  - python:
      imports:
        - proxystore
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
        - websockets
        - tosholi
        - pydantic
    script:
      - proxystore-globus-auth --help
      - proxystore-relay --help

about:
  summary: Lazy object proxy interface for distributed stores.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/gpauloski/ProxyStore

extra:
  recipe-maintainers:
    - WardLT
    - jan-janssen
    - xylar
